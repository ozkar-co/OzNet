# dnsmasq minimal configuration for OzNet
# This file should be placed in /etc/dnsmasq.d/oznet.conf
# 
# Purpose: Internal DNS for ZeroTier, VPN, and game servers only
# NO public HTTP services - those use Cloudflare Tunnel

# Basic configuration
port=53
domain-needed
bogus-priv
no-resolv
no-poll

# DNS servers for external queries
server=8.8.8.8
server=1.1.1.1
server=8.8.4.4

# OzNet domain configuration
domain=oznet

# Essential service mappings (internal access only)
address=/home.oznet/172.26.0.1
address=/server.oznet/172.26.0.2

# ZeroTier interface configuration
interface=zt+
listen-address=172.26.0.1

# Cache configuration
cache-size=1000
neg-ttl=3600
local-ttl=3600

# Logging
log-queries
log-facility=/var/log/dnsmasq.log 